<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 시세 전체 리스트</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --surface2: #161616;
      --border: #222;
      --text: #e8e8e8;
      --text-dim: #555;
      --text-mid: #888;
      --up: #e8534a;
      --down: #4a90e8;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .page-header {
      padding: 32px 32px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-top: 20px;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
    }

    .tab-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: var(--text-mid); }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }

    .search-box:focus { border-color: var(--text-mid); }
    .search-box::placeholder { color: var(--text-dim); }

    .count-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── 리스트 ── */
    .list-wrap {
      padding: 0 32px 40px;
    }

    .list-header {
      display: grid;
      grid-template-columns: 2.5fr 80px 120px 110px 90px 120px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
    }

    .list-header span:not(:first-child) { text-align: right; }

    .sort-btn {
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      width: 100%;
      justify-content: flex-end;
      transition: color 0.15s;
    }

    .sort-btn.left { justify-content: flex-start; }
    .sort-btn:hover { color: var(--text-mid); }
    .sort-btn.active { color: var(--text); }

    .sort-icon { font-style: normal; font-size: 9px; opacity: 0.5; }
    .sort-btn.active .sort-icon { opacity: 1; }

    .stock-row {
      display: grid;
      grid-template-columns: 2.5fr 80px 120px 110px 90px 120px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.1s;
      align-items: center;
    }

    .stock-row:hover { background: var(--surface2); }

    .col-name { display: flex; flex-direction: column; gap: 2px; }
    .col-name .name { font-size: 13px; font-weight: 500; }
    .col-name .code {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .stock-row span:not(.col-name):not(.name):not(.code) {
      font-family: var(--mono);
      font-size: 12px;
      text-align: right;
    }

    .col-market {
      font-family: var(--mono);
      font-size: 10px;
      text-align: left !important;
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 2px;
    }

    .badge-kospi  { background: rgba(232,83,74,0.12);  color: #e8534a; }
    .badge-kosdaq { background: rgba(74,144,232,0.12); color: #4a90e8; }
    .badge-konex  { background: rgba(180,180,180,0.1); color: #888; }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .neutral { color: var(--text-mid); }

    /* ── 더 보기 ── */
    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding: 28px 0;
    }

    .load-more-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .load-more-btn:hover:not(:disabled) {
      border-color: var(--text-mid);
      color: var(--text-mid);
    }

    .load-more-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── 로딩 ── */
    #page-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    #page-loading::after {
      content: '';
      display: inline-block;
      width: 4px;
      height: 14px;
      background: var(--text-dim);
      margin-left: 10px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── 모달 오버레이 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-section-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 24px 0 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .info-cell {
      background: var(--surface);
      padding: 10px 14px;
    }

    .info-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .info-value {
      font-family: var(--mono);
      font-size: 12px;
    }

    /* ── API 원본 데이터 테이블 ── */
    .api-section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 7px 12px;
      margin-top: 20px;
    }

    .api-table {
      border: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .api-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
    }

    .api-row:last-child { border-bottom: none; }

    .api-key { color: var(--text-dim); flex-shrink: 0; }
    .api-val { text-align: right; word-break: break-all; }

    .api-empty {
      padding: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .api-err { color: var(--up); font-size: 9px; }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-subtitle {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 0 0 0 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px 24px 24px; }

    .modal-loading {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 0;
    }

    /* 모달 가격 */
    .modal-price {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .modal-current {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 500;
    }

    .modal-current .won {
      font-size: 16px;
      color: var(--text-mid);
      margin-left: 2px;
    }

    .modal-change {
      font-family: var(--mono);
      font-size: 13px;
    }

    /* 모달 차트 */
    #modal-chart {
      display: block;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    /* 모달 통계 */
    .modal-stats {
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .modal-stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }

    .modal-stat-row:last-child { border-bottom: none; }

    .modal-stat-row .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      align-self: center;
    }

    .modal-stat-row span:not(.stat-label) { text-align: right; }

    .modal-stat-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .modal-stat-header span:not(:first-child) { text-align: right; }
  </style>
</head>
<body>

  <div class="page-header">
    <div>
      <div class="page-title">주식 시세</div>
      <div class="page-date" id="date-label">날짜 로딩 중...</div>
    </div>
    <div class="header-right">
      <span class="count-label" id="count-label"></span>
      <input class="search-box" id="search" placeholder="종목명 / 코드 검색" oninput="onSearch(this.value)">
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="setMarket('')">전체</button>
    <button class="tab-btn" onclick="setMarket('KOSPI')">KOSPI</button>
    <button class="tab-btn" onclick="setMarket('KOSDAQ')">KOSDAQ</button>
    <button class="tab-btn" onclick="setMarket('KONEX')">KONEX</button>
  </div>

  <div id="page-loading">데이터 로딩 중</div>

  <div class="list-wrap" id="list-wrap" style="display:none">
    <div class="list-header" id="list-header">
      <span><button class="sort-btn left" onclick="setSort('itmsNm')">종목 <i class="sort-icon" id="si-itmsNm"></i></button></span>
      <span><button class="sort-btn left" onclick="setSort('mrktCtg')">시장 <i class="sort-icon" id="si-mrktCtg"></i></button></span>
      <span><button class="sort-btn" onclick="setSort('clpr')">종가 <i class="sort-icon" id="si-clpr"></i></button></span>
      <span><button class="sort-btn" onclick="setSort('vs')">전일대비 <i class="sort-icon" id="si-vs"></i></button></span>
      <span><button class="sort-btn" onclick="setSort('fltRt')">등락률 <i class="sort-icon" id="si-fltRt"></i></button></span>
      <span><button class="sort-btn" onclick="setSort('trqu')">거래량 <i class="sort-icon" id="si-trqu"></i></button></span>
    </div>
    <div id="stock-list"></div>
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">더 보기</button>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-name"></div>
          <div class="modal-subtitle" id="modal-code"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    const BASE_URL = '/api/proxy?svc=GetStockSecuritiesInfoService&op=getStockPriceInfo';
    const PAGE_SIZE = 100;

    let latestDate = '';
    let allLoaded = [];
    let currentPage = 1;
    let totalCount = 0;
    let searchQuery = '';
    let marketFilter = '';
    let sortKey = '';
    let sortDir = 1; // 1 = 오름차순, -1 = 내림차순

    function toDateStr(d) {
      return d.toISOString().slice(0, 10).replace(/-/g, '');
    }

    function formatNum(n) {
      return Number(n).toLocaleString('ko-KR');
    }

    function formatDate(s) {
      if (!s || s.length < 8) return '—';
      return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
    }

    // ── 최근 거래일 탐색 ──
    async function findLatestDate() {
      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = toDateStr(d);
        const params = new URLSearchParams({ numOfRows: '1', pageNo: '1', basDt: dateStr });
        const res = await fetch(`${BASE_URL}&${params}`);
        const json = await res.json();
        const count = Number(json?.response?.body?.totalCount);
        if (count > 0) return { date: dateStr, total: count };
      }
      throw new Error('최근 거래일을 찾을 수 없습니다');
    }

    // ── 페이지 fetch ──
    async function fetchPage(date, page) {
      const params = new URLSearchParams({ numOfRows: String(PAGE_SIZE), pageNo: String(page), basDt: date });
      const res = await fetch(`${BASE_URL}&${params}`);
      const json = await res.json();
      const items = json?.response?.body?.items?.item;
      if (!items) return [];
      return Array.isArray(items) ? items : [items];
    }

    // ── 초기화 ──
    async function init() {
      try {
        const { date, total } = await findLatestDate();
        latestDate = date;
        totalCount = total;
        document.getElementById('date-label').textContent = `KRX · ${formatDate(date)} 기준`;

        const first = await fetchPage(date, 1);
        allLoaded = first;
        currentPage = 1;

        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('list-wrap').style.display = 'block';

        renderList();
        updateLoadMore();
      } catch (err) {
        document.getElementById('page-loading').textContent = `오류: ${err.message}`;
      }
    }

    function marketBadge(mkt) {
      const m = (mkt || '').toUpperCase();
      if (m === 'KOSPI')  return `<span class="badge badge-kospi">KOSPI</span>`;
      if (m === 'KOSDAQ') return `<span class="badge badge-kosdaq">KOSDAQ</span>`;
      if (m === 'KONEX')  return `<span class="badge badge-konex">KONEX</span>`;
      return `<span class="badge badge-konex">${mkt}</span>`;
    }

    const SORT_KEYS = ['itmsNm', 'mrktCtg', 'clpr', 'vs', 'fltRt', 'trqu'];

    function setSort(key) {
      if (sortKey === key) {
        sortDir *= -1;
      } else {
        sortKey = key;
        sortDir = key === 'itmsNm' || key === 'mrktCtg' ? 1 : -1;
      }
      // 헤더 아이콘 업데이트
      SORT_KEYS.forEach(k => {
        const el = document.getElementById(`si-${k}`);
        const btn = el?.closest('.sort-btn');
        if (!el) return;
        if (k === sortKey) {
          el.textContent = sortDir === 1 ? '▲' : '▼';
          btn?.classList.add('active');
        } else {
          el.textContent = '';
          btn?.classList.remove('active');
        }
      });
      renderList();
    }

    function setMarket(mkt) {
      marketFilter = mkt;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === (mkt || '전체'));
      });
      renderList();
    }

    // ── 렌더 ──
    function renderList() {
      const q = searchQuery.toLowerCase();
      let filtered = allLoaded;
      if (marketFilter) filtered = filtered.filter(d => (d.mrktCtg || '').toUpperCase() === marketFilter);
      if (q) filtered = filtered.filter(d =>
        (d.itmsNm || '').toLowerCase().includes(q) ||
        (d.srtnCd || '').includes(q));

      if (sortKey) {
        const isStr = sortKey === 'itmsNm' || sortKey === 'mrktCtg';
        filtered = [...filtered].sort((a, b) => {
          const av = isStr ? (a[sortKey] || '') : Number(a[sortKey]);
          const bv = isStr ? (b[sortKey] || '') : Number(b[sortKey]);
          if (av < bv) return -sortDir;
          if (av > bv) return  sortDir;
          return 0;
        });
      }

      document.getElementById('count-label').textContent =
        `${filtered.length.toLocaleString()} / ${totalCount.toLocaleString()}개`;

      document.getElementById('stock-list').innerHTML = filtered.map(d => {
        const chg = Number(d.vs);
        const pct = Number(d.fltRt);
        const cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'neutral';
        const sign = chg > 0 ? '+' : '';
        const isin = (d.isinCd || '').trim();
        const name = (d.itmsNm || '').replace(/'/g, '&#39;');
        const code = (d.srtnCd || '').trim();
        const mkt  = (d.mrktCtg || '');
        return `
          <div class="stock-row" onclick="openModal('${isin}','${name}','${code}','${mkt}')">
            <span class="col-name">
              <span class="name">${d.itmsNm}</span>
              <span class="code">${code}</span>
            </span>
            <span class="col-market">${marketBadge(mkt)}</span>
            <span>${formatNum(d.clpr)}</span>
            <span class="${cls}">${sign}${formatNum(d.vs)}</span>
            <span class="${cls}">${sign}${pct.toFixed(2)}%</span>
            <span style="color:var(--text-mid)">${formatNum(d.trqu)}</span>
          </div>`;
      }).join('');
    }

    function updateLoadMore() {
      const wrap = document.getElementById('load-more-wrap');
      const btn  = document.getElementById('load-more-btn');
      if (allLoaded.length < totalCount) {
        wrap.style.display = 'flex';
        btn.textContent = `더 보기 (${allLoaded.length.toLocaleString()} / ${totalCount.toLocaleString()})`;
        btn.disabled = false;
      } else {
        wrap.style.display = 'none';
      }
    }

    async function loadMore() {
      const btn = document.getElementById('load-more-btn');
      btn.textContent = '로딩 중...';
      btn.disabled = true;
      try {
        currentPage++;
        const more = await fetchPage(latestDate, currentPage);
        allLoaded = allLoaded.concat(more);
        renderList();
        updateLoadMore();
      } catch (err) {
        btn.textContent = '오류 발생 — 다시 시도';
        btn.disabled = false;
        currentPage--;
      }
    }

    function onSearch(val) {
      searchQuery = val;
      renderList();
    }

    const ITEM_INFO_URL  = '/api/proxy?svc=GetKrxListedInfoService&op=getItemInfo';
    const CORP_INFO_URL  = '/api/proxy?svc=GetCorpBasicInfoService_V2&op=getCorpBasicInfo';

    const FIELD_LABELS = {
      basDt: '기준일자', srtnCd: '단축코드', isinCd: 'ISIN 코드',
      itmsNm: '종목명', mrktCtg: '시장구분',
      clpr: '종가', mkp: '시가', hipr: '고가', lopr: '저가',
      vs: '전일대비', fltRt: '등락률',
      trqu: '거래량', trPrc: '거래대금',
      lstgStCnt: '상장주식수', mrktTotAmt: '시가총액',
      // KRX 상장종목정보
      crno: '법인등록번호', corpNm: '법인명',
      shotnIsin: '단축ISIN', mktId: '시장ID',
      kindStkcertTpNm: '종목유형',
      parval: '액면가', issuStCnt: '발행주식수',
      lstgDt: '상장일', delstgDt: '상장폐지일',
      // 기업기본정보
      indutyNm: '업종명', indutyCd: '업종코드',
      enpBsadr: '본사주소', enpRprFnm: '대표자명',
      enpHmpgUrl: '홈페이지', enpTlno: '대표전화',
      enpEmpeCnt: '직원수', enpEstbDt: '설립일',
      enpFsclYrCnt: '결산월', bzno: '사업자번호',
      enpPbntyCd: '상장구분', smenpYn: '중소기업여부',
    };

    const NUM_FIELDS = new Set([
      'clpr','mkp','hipr','lopr','vs','trqu','trPrc','lstgStCnt','mrktTotAmt','parval','issuStCnt'
    ]);

    const DATE_FIELDS = new Set(['basDt', 'lstgDt', 'delstgDt', 'enpEstbDt']);

    function formatFieldValue(key, val) {
      if (!val && val !== 0) return '—';
      if (DATE_FIELDS.has(key)) return formatDate(String(val));
      if (key === 'fltRt') return `${Number(val) >= 0 ? '+' : ''}${Number(val).toFixed(2)}%`;
      if (key === 'mrktTotAmt' || key === 'trPrc') {
        const v = Number(val);
        if (v >= 1e12) return `${(v / 1e12).toFixed(2)}조`;
        if (v >= 1e8)  return `${(v / 1e8).toFixed(0)}억`;
        return formatNum(v);
      }
      if (NUM_FIELDS.has(key)) return formatNum(val);
      return String(val);
    }

    // ── 모달 ──
    async function openModal(isinCd, name, code, market) {
      const modal = document.getElementById('modal');
      modal.style.display = 'flex';
      document.getElementById('modal-name').textContent = name;
      document.getElementById('modal-code').textContent =
        `${market} · ${code} · ${isinCd}`;
      document.getElementById('modal-body').innerHTML =
        '<div class="modal-loading">로딩 중...</div>';

      try {
        const end = new Date();
        const start = new Date();
        start.setDate(start.getDate() - 14);

        const priceParams = new URLSearchParams({
          numOfRows: '14', pageNo: '1',
          beginBasDt: toDateStr(start), endBasDt: toDateStr(end),
          isinCd: isinCd,
        });

        const infoParams = new URLSearchParams({
          numOfRows: '5', pageNo: '1',
          basDt: latestDate, isinCd: isinCd,
        });

        const [priceRes, infoRes] = await Promise.all([
          fetch(`${BASE_URL}&${priceParams}`),
          fetch(`${ITEM_INFO_URL}&${infoParams}`).catch(() => null),
        ]);

        const priceJson = await priceRes.json();

        // 1단계: 상장종목정보 (crno 확보)
        let listingInfo = null;
        let companyError = null;
        if (!infoRes || !infoRes.ok) {
          companyError = infoRes ? `HTTP ${infoRes.status}` : '네트워크 오류';
        } else {
          try {
            const infoJson = await infoRes.json();
            const infoItems = infoJson?.response?.body?.items?.item;
            listingInfo = infoItems
              ? (Array.isArray(infoItems) ? infoItems[0] : infoItems)
              : null;
          } catch (e) { companyError = e.message; }
        }

        // 2단계: 기업기본정보 (crno 있을 때만)
        let corpInfo = null;
        if (listingInfo?.crno) {
          try {
            const corpParams = new URLSearchParams({ numOfRows: '1', pageNo: '1', crno: listingInfo.crno });
            const corpRes = await fetch(`${CORP_INFO_URL}&${corpParams}`);
            if (corpRes.ok) {
              const corpJson = await corpRes.json();
              const corpItems = corpJson?.response?.body?.items?.item;
              corpInfo = corpItems
                ? (Array.isArray(corpItems) ? corpItems[0] : corpItems)
                : null;
            }
          } catch (_) {}
        }

        // 두 API 결과 병합
        const companyInfo = (listingInfo || corpInfo)
          ? { ...listingInfo, ...corpInfo }
          : null;

        const items = priceJson?.response?.body?.items?.item;
        if (!items) throw new Error('데이터를 찾을 수 없습니다');

        const arr = (Array.isArray(items) ? items : [items])
          .filter(d => (d.isinCd || '').trim() === isinCd)
          .sort((a, b) => a.basDt.localeCompare(b.basDt));
        if (!arr.length) throw new Error('해당 종목 데이터가 없습니다');

        const today     = arr[arr.length - 1];
        const yesterday = arr.length >= 2 ? arr[arr.length - 2] : null;
        renderModalContent(today, yesterday, listingInfo, corpInfo, companyError);
      } catch (err) {
        document.getElementById('modal-body').innerHTML =
          `<div class="modal-loading" style="color:var(--up)">${err.message}</div>`;
      }
    }

    function apiTable(data, label) {
      if (!data) return `<div class="api-empty">데이터 없음</div>`;
      return Object.entries(data)
        .filter(([, v]) => v != null && v !== '')
        .map(([k, v]) => `
          <div class="api-row">
            <span class="api-key">${FIELD_LABELS[k] || k}</span>
            <span class="api-val">${formatFieldValue(k, v)}</span>
          </div>`).join('');
    }

    function renderModalContent(today, yesterday, listingInfo, corpInfo, companyError) {
      const chg = Number(today.vs);
      const pct = Number(today.fltRt);
      const sign = chg >= 0 ? '+' : '';
      const cls  = chg > 0 ? 'up' : chg < 0 ? 'down' : 'neutral';

      const compareRows = [
        ['시가', 'mkp'], ['고가', 'hipr'], ['저가', 'lopr'],
        ['종가', 'clpr'], ['거래량', 'trqu'], ['거래대금', 'trPrc'],
      ];

      document.getElementById('modal-body').innerHTML = `
        <div class="modal-price">
          <span class="modal-current">${formatNum(today.clpr)}<span class="won">원</span></span>
          <span class="modal-change ${cls}">${sign}${formatNum(today.vs)} (${sign}${pct.toFixed(2)}%)</span>
        </div>

        <canvas id="modal-chart" style="width:100%;height:140px;margin-bottom:20px"></canvas>

        <div class="modal-section-title">전일 비교 (${yesterday ? formatDate(yesterday.basDt) : '—'} → ${formatDate(today.basDt)})</div>
        <div class="modal-stats">
          <div class="modal-stat-header">
            <span></span>
            <span>${yesterday ? formatDate(yesterday.basDt) : '—'}</span>
            <span>${formatDate(today.basDt)}</span>
          </div>
          ${compareRows.map(([label, key]) => `
            <div class="modal-stat-row">
              <span class="stat-label">${label}</span>
              <span>${yesterday ? formatFieldValue(key, yesterday[key]) : '—'}</span>
              <span class="${key === 'clpr' ? cls : ''}">${formatFieldValue(key, today[key])}</span>
            </div>`).join('')}
        </div>

        <div class="api-section-label">GetStockSecuritiesInfoService · getStockPriceInfo</div>
        <div class="api-table">${apiTable(today)}</div>

        <div class="api-section-label">GetKrxListedInfoService · getItemInfo${companyError && !listingInfo ? ` <span class="api-err">${companyError}</span>` : ''}</div>
        <div class="api-table">${apiTable(listingInfo)}</div>

        <div class="api-section-label">GetCorpBasicInfoService_V2 · getCorpBasicInfo</div>
        <div class="api-table">${apiTable(corpInfo)}</div>
      `;

      drawModalChart(today, yesterday);
    }

    function drawModalChart(today, yesterday) {
      const canvas = document.getElementById('modal-chart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.parentElement.clientWidth - 48;
      const H = 140;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(dpr, dpr);

      const days = yesterday ? [yesterday, today] : [today];
      const allP = days.flatMap(d => [Number(d.lopr), Number(d.hipr)]);
      const minP = Math.min(...allP);
      const maxP = Math.max(...allP);
      const pad = (maxP - minP) * 0.1 || 1;

      const lo = minP - pad;
      const hi = maxP + pad;

      const pl = { top: 16, bottom: 28, left: 16, right: 72 };
      const cW = W - pl.left - pl.right;
      const cH = H - pl.top - pl.bottom;

      const yS = v => pl.top + (1 - (v - lo) / (hi - lo)) * cH;

      ctx.clearRect(0, 0, W, H);

      // 그리드
      for (let i = 0; i <= 3; i++) {
        const y = pl.top + (i / 3) * cH;
        const val = hi - (i / 3) * (hi - lo);
        ctx.strokeStyle = '#1c1c1c';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pl.left, y); ctx.lineTo(W - pl.right, y); ctx.stroke();
        ctx.fillStyle = '#3a3a3a';
        ctx.font = `9px 'IBM Plex Mono', monospace`;
        ctx.textAlign = 'left';
        ctx.fillText(formatNum(Math.round(val)), W - pl.right + 6, y + 3);
      }

      const barW = Math.min(52, cW / days.length * 0.45);
      const slot  = cW / days.length;

      days.forEach((d, i) => {
        const x    = pl.left + slot * (i + 0.5);
        const open = Number(d.mkp);
        const close = Number(d.clpr);
        const high  = Number(d.hipr);
        const low   = Number(d.lopr);
        const isUp  = close >= open;
        const color = isUp ? '#e8534a' : '#4a90e8';

        // 심지
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, yS(high));
        ctx.lineTo(x, yS(low));
        ctx.stroke();

        // 몸통
        const bodyY = yS(Math.max(open, close));
        const bodyH = Math.max(2, Math.abs(yS(open) - yS(close)));
        ctx.fillStyle = color;
        ctx.fillRect(x - barW / 2, bodyY, barW, bodyH);

        // 라벨
        const label = i === days.length - 1 ? '오늘' : '어제';
        ctx.fillStyle = '#555';
        ctx.font = `9px 'IBM Plex Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(label, x, H - 8);
      });
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function onOverlayClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    init();
  </script>
</body>
